[pytest]
asyncio_mode = auto

markers =
    slow:       tests that sleep or wait on long timers (heartbeat, 30s+ waits)
    ratelimit:  tests that intentionally exhaust a rate-limit bucket in Redis;
                run these in isolation or with a fresh Redis (docker compose restart redis)

# Skip slow + ratelimit in a default run
addopts = -m "not slow and not ratelimit"
